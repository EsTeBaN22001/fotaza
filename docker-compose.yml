version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: fotaza_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fotaza2
      MYSQL_PASSWORD: userpassword
      MYSQL_USER: fotaza_user
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - fotaza_network

  app:
    build: .
    container_name: fotaza_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=fotaza2
      - DB_USER=root
      - DB_PASS=rootpassword
      - JWT_SECRET=af0e23e151b5cb0d9b52bbf23f02de6f4d2c500449ddadda8a512d1ca97134c664f5d22305f8d8d7b794aec71be30eb82b2ff4332b73e9137f697bee941fa070
      - APP_URL=http://localhost:3000
    depends_on:
      - db
    command: npm run dev
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - ./src/public/uploads:/usr/src/app/src/public/uploads
    networks:
      - fotaza_network

networks:
  fotaza_network:
    driver: bridge

volumes:
  mysql_data:
